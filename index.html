<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🐍 贪食蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #1a1a2e;
    font-family: 'Courier New', monospace;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  /* 上方：游戏画面区域 */
  .game-top {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 6px 4px 0;
  }
  h1 { color: #e94560; margin-bottom: 2px; font-size: clamp(1rem, 4vw, 1.5rem); }
  .info-bar {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 400px;
    margin-bottom: 2px;
    color: #eee;
    font-size: 0.9rem;
    padding: 0 4px;
  }
  .score { color: #0f0; font-weight: bold; }
  .best { color: #ffd700; font-weight: bold; }
  canvas {
    border: 2px solid #e94560;
    background: #16213e;
    display: block;
    max-width: 100%;
    touch-action: manipulation;
  }
  .match-overlay {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.82);
    border: 2px solid #ffd700;
    border-radius: 10px;
    padding: 10px 16px;
    text-align: center;
    z-index: 5;
    pointer-events: none;
    white-space: nowrap;
  }
  .match-title  { color: #75b5ff; font-size: clamp(0.7rem, 2.5vw, 0.9rem); font-weight: bold; }
  .match-time  { color: #ffd700; font-size: clamp(0.8rem, 3vw, 1.1rem); font-weight: bold; margin: 2px 0; }
  .match-teams { color: #fff;     font-size: clamp(0.85rem, 3.2vw, 1.2rem); font-weight: bold; }

  .game-over-msg {
    color: #e94560;
    font-size: 0.85rem;
    min-height: 40px;
    text-align: center;
    line-height: 1.5;
  }

  /* 下方：触控按键 - 固定在屏幕底部 */
  .touch-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #111827;
    padding: 8px 4px max(8px, env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    border-top: 1px solid rgba(255,255,255,0.1);
    z-index: 10;
  }
  .dpad-row {
    display: flex;
    gap: 6px;
  }
  .dpad-btn {
    width: 54px;
    height: 54px;
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.12);
    color: #fff;
    font-size: 1.3rem;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.05s;
  }
  .dpad-btn:active {
    background: #e94560;
    border-color: #e94560;
    transform: scale(0.92);
  }
  .dpad-placeholder {
    width: 54px;
    height: 54px;
  }
  .action-row {
    display: flex;
    gap: 10px;
  }
  .action-btn {
    padding: 12px 22px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.08);
    color: #ddd;
    font-size: 0.9rem;
    font-weight: bold;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    font-family: inherit;
  }
  .action-btn:active {
    background: rgba(255,255,255,0.2);
    transform: scale(0.95);
  }
  .btn-start {
    border-color: #00ff88;
    color: #00ff88;
    background: rgba(0,255,136,0.1);
    font-size: 1rem;
    padding: 13px 28px;
  }
  .btn-start:active {
    background: rgba(0,255,136,0.3);
  }

  .keyboard-tip {
    text-align: center;
    color: #555;
    font-size: 0.7rem;
    margin-top: 2px;
  }

  /* 电脑端：按键面板不用 fixed，自然排列 */
  @media (min-width: 768px) {
    .touch-panel {
      position: static;
      background: transparent;
      border-top: none;
      padding: 8px 4px;
    }
  }
</style>
</head>
<body>

<div class="game-top" id="gameTop">
  <h1>🐍 贪食蛇</h1>
  <div class="info-bar">
    <span>🍎 得分: <span class="score" id="score">0</span></span>
    <span>🏆 最高: <span class="best" id="best">0</span></span>
  </div>
  <div style="position:relative; display:inline-block;">
    <canvas id="canvas"></canvas>
    <div class="match-overlay" id="matchOverlay" style="display:none;">
      <div class="match-title">2026年美加墨世界杯</div>
      <div class="match-time">北京时间 7月2日 08:00</div>
      <div class="match-teams">美国 vs 波黑</div>
    </div>
  </div>
  <div class="game-over-msg" id="msg">按"开始游戏"或空格键开始</div>
</div>

<div class="touch-panel" id="touchPanel">
  <div class="dpad-row">
    <div class="dpad-placeholder"></div>
    <button class="dpad-btn" id="btnUp">▲</button>
    <div class="dpad-placeholder"></div>
  </div>
  <div class="dpad-row">
    <button class="dpad-btn" id="btnLeft">◀</button>
    <button class="dpad-btn" id="btnPause">⏯</button>
    <button class="dpad-btn" id="btnRight">▶</button>
  </div>
  <div class="dpad-row">
    <div class="dpad-placeholder"></div>
    <button class="dpad-btn" id="btnDown">▼</button>
    <div class="dpad-placeholder"></div>
  </div>
  <div class="action-row">
    <button class="action-btn btn-start" id="btnStart">▶ 开始游戏</button>
    <button class="action-btn" id="btnRestart">🔄 重新开始</button>
  </div>
  <div class="keyboard-tip">也支持键盘 ↑↓←→ WASD / 空格 / R</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// 计算 canvas 大小：适应屏幕
const panelH = 260; // 触控面板大约高度
const availW = Math.min(window.innerWidth, 420);
const availH = window.innerHeight - panelH - 100; // 减去顶部信息和面板
const gridSize = Math.floor(Math.min(availW / 25, availH / 25));
const GRID = Math.max(12, Math.min(gridSize, 20));
const COLS = 25;
const ROWS = 25;
canvas.width = COLS * GRID;
canvas.height = ROWS * GRID;

let snake, food, direction, nextDirection, score, best, gameOver, paused, gameLoop, started;
let fireworks = [], fireworksTimer = null;

function setDir(dx, dy) {
  if (gameOver || !started) return;
  if (dx !== 0 && direction.x === -dx) return;
  if (dy !== 0 && direction.y === -dy) return;
  nextDirection = { x: dx, y: dy };
}

function togglePause() {
  if (gameOver || !started) return;
  paused = !paused;
  document.getElementById('msg').textContent = paused ? '⏸ 已暂停' : '';
}

function startGame() {
  if (started && !gameOver) return;
  if (gameOver) { resetGame(); }
  started = true;
  paused = false;
  document.getElementById('msg').textContent = '';
  clearInterval(gameLoop);
  gameLoop = setInterval(step, 250);
}

function resetGame() {
  if (fireworksTimer) {
    clearTimeout(fireworksTimer);
    fireworksTimer = null;
  }
  fireworks = [];
  document.getElementById('matchOverlay').style.display = 'none';
  snake = [
    { x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) },
    { x: Math.floor(COLS / 2) - 1, y: Math.floor(ROWS / 2) },
    { x: Math.floor(COLS / 2) - 2, y: Math.floor(ROWS / 2) },
  ];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  score = 0;
  gameOver = false;
  paused = false;
  started = false;
  best = parseInt(localStorage.getItem('snakeBest')) || 0;
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('msg').textContent = '按"开始游戏"或空格键开始';
  spawnFood();
  clearInterval(gameLoop);
  draw();
}

// 按钮绑定
['btnUp','btnDown','btnLeft','btnRight','btnPause','btnStart','btnRestart'].forEach(id => {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart', e => {
    e.preventDefault();
    e.stopPropagation();
    if (id === 'btnUp') setDir(0, -1);
    if (id === 'btnDown') setDir(0, 1);
    if (id === 'btnLeft') setDir(-1, 0);
    if (id === 'btnRight') setDir(1, 0);
    if (id === 'btnPause') togglePause();
    if (id === 'btnStart') startGame();
    if (id === 'btnRestart') resetGame();
  }, {passive: false});
  el.addEventListener('click', e => {
    e.preventDefault();
    if (id === 'btnUp') setDir(0, -1);
    if (id === 'btnDown') setDir(0, 1);
    if (id === 'btnLeft') setDir(-1, 0);
    if (id === 'btnRight') setDir(1, 0);
    if (id === 'btnPause') togglePause();
    if (id === 'btnStart') startGame();
    if (id === 'btnRestart') resetGame();
  });
});

// 画布滑动手势
let touchStartX, touchStartY;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  e.preventDefault();
}, {passive: false});
canvas.addEventListener('touchend', e => {
  if (touchStartX == null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (Math.max(absDx, absDy) < 15) return; // 太小忽略
  if (!started) { startGame(); }
  if (absDx > absDy) {
    setDir(dx > 0 ? 1 : -1, 0);
  } else {
    setDir(0, dy > 0 ? 1 : -1);
  }
  touchStartX = null;
  touchStartY = null;
});

function spawnFood() {
  const MARGIN = 2; // 离边框至少2格
  do {
    food = {
      x: MARGIN + Math.floor(Math.random() * (COLS - MARGIN * 2)),
      y: MARGIN + Math.floor(Math.random() * (ROWS - MARGIN * 2)),
    };
  } while (snake.some(s => s.x === food.x && s.y === food.y));
}

function step() {
  if (gameOver || paused || !started) return;
  direction = { ...nextDirection };
  const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return endGame();
  if (snake.some(s => s.x === head.x && s.y === head.y)) return endGame();
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    document.getElementById('score').textContent = score;
    if (score > best) {
      best = score;
      localStorage.setItem('snakeBest', best);
      document.getElementById('best').textContent = best;
    }
    spawnFood();
  } else {
    snake.pop();
  }
  draw();
}

function endGame() {
  gameOver = true;
  started = false;
  clearInterval(gameLoop);

  const head = snake[0];
  const cx = head.x * GRID + GRID / 2;
  const cy = head.y * GRID + GRID / 2;
  let matchShown = false;

  function showMatch() {
    if (matchShown) return;
    matchShown = true;
    if (fireworksTimer) { clearTimeout(fireworksTimer); fireworksTimer = null; }
    fireworks = [];
    document.getElementById('msg').textContent = '💀 游戏结束！点"开始游戏"再来';
    document.getElementById('matchOverlay').style.display = 'block';
    draw();
  }

  // 兜底：3秒后强制显示比赛信息（无论烟花是否播放完）
  const fallback = setTimeout(showMatch, 3000);

  setTimeout(() => {
    createFireworks(cx, cy);
    animateFireworks(() => {
      clearTimeout(fallback);
      showMatch();
    });
  }, 50);
}

function createFireworks(cx, cy) {
  fireworks = [];
  const colors = [
    '#FF0000','#FF4500','#FF8C00','#FFD700','#FFFF00',
    '#ADFF2F','#00FF00','#00FA9A','#00CED1','#1E90FF',
    '#8A2BE2','#FF00FF','#FF1493','#FF6347','#FFFFFF',
    '#FFD700','#7FFF00','#00FFFF','#FF69B4'
  ];
  const particleCount = 120;
  for (let i = 0; i < particleCount; i++) {
    const angle = (Math.PI * 2 * i) / particleCount + (Math.random() - 0.5) * 0.3;
    const speed = 2.5 + Math.random() * 7;
    fireworks.push({
      x: cx,
      y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1,
      decay: 0.01 + Math.random() * 0.025,
      size: 3 + Math.random() * 6,
    });
  }
}

function animateFireworks(callback) {
  if (fireworks.length === 0) {
    if (callback) callback();
    return;
  }

  function tick() {
    let alive = false;
    for (const p of fireworks) {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.96;
      p.vy *= 0.96;
      p.life -= p.decay;
      if (p.life > 0.02) alive = true;
    }

    draw();

    if (alive) {
      fireworksTimer = setTimeout(tick, 33);
    } else {
      fireworksTimer = null;
      fireworks = [];
      if (callback) callback();
    }
  }

  tick();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * GRID, 0); ctx.lineTo(x * GRID, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * GRID); ctx.lineTo(canvas.width, y * GRID); ctx.stroke();
  }
  ctx.fillStyle = '#e94560';
  ctx.shadowColor = '#e94560';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // 烟花粒子（画在蛇前面，确保可见）
  ctx.save();
  fireworks.forEach(p => {
    if (p.life <= 0) return;
    ctx.globalAlpha = Math.min(1, p.life);
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 0;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  });
  ctx.restore();

  snake.forEach((s, i) => {
    const x = s.x * GRID + 1, y = s.y * GRID + 1, size = GRID - 2;
    if (i === 0) {
      ctx.fillStyle = '#00ff88';
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 6;
    } else {
      const t = i / snake.length;
      ctx.fillStyle = `rgb(${Math.floor(t * 30)},${Math.floor(200 - t * 120)},${Math.floor(70 - t * 40)})`;
      ctx.shadowBlur = 0;
    }
    ctx.beginPath();
    ctx.roundRect(x, y, size, size, 4);
    ctx.fill();
  });
  ctx.shadowBlur = 0;

}

document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  if (key === 'arrowup'    || key === 'w') { if (direction.y !== 1)  nextDirection = { x: 0, y: -1 }; if (!started) startGame(); e.preventDefault(); }
  if (key === 'arrowdown'  || key === 's') { if (direction.y !== -1) nextDirection = { x: 0, y: 1 };  if (!started) startGame(); e.preventDefault(); }
  if (key === 'arrowleft'  || key === 'a') { if (direction.x !== 1)  nextDirection = { x: -1, y: 0 }; if (!started) startGame(); e.preventDefault(); }
  if (key === 'arrowright' || key === 'd') { if (direction.x !== -1) nextDirection = { x: 1, y: 0 };  if (!started) startGame(); e.preventDefault(); }
  if (key === ' ') { if (gameOver) resetGame(); else if (!started) startGame(); else togglePause(); e.preventDefault(); }
  if (key === 'r') { resetGame(); e.preventDefault(); }
});

function init() {
  if (fireworksTimer) {
    clearTimeout(fireworksTimer);
    fireworksTimer = null;
  }
  fireworks = [];
  document.getElementById('matchOverlay').style.display = 'none';
  snake = [
    { x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) },
    { x: Math.floor(COLS / 2) - 1, y: Math.floor(ROWS / 2) },
    { x: Math.floor(COLS / 2) - 2, y: Math.floor(ROWS / 2) },
  ];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  score = 0;
  gameOver = false;
  paused = false;
  started = false;
  best = parseInt(localStorage.getItem('snakeBest')) || 0;
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('msg').textContent = '按"开始游戏"或空格键开始';
  spawnFood();
  draw();
}

init();
</script>
</body>
</html>
