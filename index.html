<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 贪食蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a2e;
    font-family: 'Courier New', monospace;
  }
  .game-wrapper {
    text-align: center;
  }
  h1 { color: #e94560; margin-bottom: 10px; font-size: 2rem; }
  .info-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    color: #eee;
    font-size: 1.1rem;
  }
  .score { color: #0f0; }
  .best { color: #ffd700; }
  canvas {
    border: 2px solid #e94560;
    background: #16213e;
    display: block;
    margin: 0 auto;
  }
  .controls {
    margin-top: 12px;
    color: #aaa;
    font-size: 0.9rem;
  }
  .controls span { color: #e94560; font-weight: bold; }
  .game-over-msg {
    color: #e94560;
    font-size: 1.2rem;
    margin-top: 8px;
    min-height: 28px;
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <h1>🐍 贪食蛇</h1>
  <div class="info-bar">
    <span>🍎 得分: <span class="score" id="score">0</span></span>
    <span>🏆 最高: <span class="best" id="best">0</span></span>
  </div>
  <canvas id="canvas"></canvas>
  <div class="game-over-msg" id="msg"></div>
  <div class="controls">
    <span>↑↓←→</span> 或 <span>WASD</span> 控制方向 &nbsp;|&nbsp;
    <span>空格</span> 暂停/继续 &nbsp;|&nbsp;
    <span>R</span> 重新开始
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const GRID = 20;        // 每个格子 20px
const COLS = 25;        // 25 列
const ROWS = 25;        // 25 行
canvas.width = COLS * GRID;
canvas.height = ROWS * GRID;

let snake, food, direction, nextDirection, score, best, gameOver, paused, gameLoop;

// 初始化
function init() {
  snake = [
    { x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) },
    { x: Math.floor(COLS / 2) - 1, y: Math.floor(ROWS / 2) },
    { x: Math.floor(COLS / 2) - 2, y: Math.floor(ROWS / 2) },
  ];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  score = 0;
  gameOver = false;
  paused = false;
  best = parseInt(localStorage.getItem('snakeBest')) || 0;
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('msg').textContent = '';
  spawnFood();
  clearInterval(gameLoop);
  gameLoop = setInterval(step, 180);
}

// 随机生成食物 (不在蛇身上)
function spawnFood() {
  do {
    food = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS),
    };
  } while (snake.some(s => s.x === food.x && s.y === food.y));
}

function step() {
  if (gameOver || paused) return;

  // 应用方向
  direction = { ...nextDirection };

  const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

  // 撞墙检测
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return endGame();
  }

  // 撞自己检测
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return endGame();
  }

  snake.unshift(head);

  // 吃到食物
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    document.getElementById('score').textContent = score;
    if (score > best) {
      best = score;
      localStorage.setItem('snakeBest', best);
      document.getElementById('best').textContent = best;
    }
    spawnFood();
  } else {
    snake.pop();
  }

  draw();
}

function endGame() {
  gameOver = true;
  clearInterval(gameLoop);
  document.getElementById('msg').textContent = '💀 游戏结束！按 R 重新开始';
  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 画网格线
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * GRID, 0); ctx.lineTo(x * GRID, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * GRID); ctx.lineTo(canvas.width, y * GRID); ctx.stroke();
  }

  // 画食物
  ctx.fillStyle = '#e94560';
  ctx.shadowColor = '#e94560';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // 画蛇
  snake.forEach((s, i) => {
    const x = s.x * GRID + 1, y = s.y * GRID + 1, size = GRID - 2;
    if (i === 0) {
      // 蛇头 — 亮绿色
      ctx.fillStyle = '#00ff88';
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 6;
    } else {
      // 蛇身 — 渐暗
      const t = i / snake.length;
      const r = Math.floor(0 + t * 30);
      const g = Math.floor(200 - t * 120);
      const b = Math.floor(70 - t * 40);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.shadowBlur = 0;
    }
    ctx.beginPath();
    ctx.roundRect(x, y, size, size, 4);
    ctx.fill();
  });
  ctx.shadowBlur = 0;
}

// 键盘控制
document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();

  // 方向
  if (key === 'arrowup'    || key === 'w') { if (direction.y !== 1)  nextDirection = { x: 0, y: -1 }; e.preventDefault(); }
  if (key === 'arrowdown'  || key === 's') { if (direction.y !== -1) nextDirection = { x: 0, y: 1 };  e.preventDefault(); }
  if (key === 'arrowleft'  || key === 'a') { if (direction.x !== 1)  nextDirection = { x: -1, y: 0 }; e.preventDefault(); }
  if (key === 'arrowright' || key === 'd') { if (direction.x !== -1) nextDirection = { x: 1, y: 0 };  e.preventDefault(); }

  // 暂停
  if (key === ' ') {
    if (!gameOver) {
      paused = !paused;
      document.getElementById('msg').textContent = paused ? '⏸ 已暂停' : '';
    }
    e.preventDefault();
  }

  // 重新开始
  if (key === 'r') { init(); e.preventDefault(); }
});

init();
</script>
</body>
</html>
