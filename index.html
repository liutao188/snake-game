<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐍 贪食蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    font-family: 'Courier New', monospace;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .game-wrapper {
    text-align: center;
    padding: 8px 4px;
    max-width: 420px;
    margin: 0 auto;
  }
  h1 { color: #e94560; margin-bottom: 4px; font-size: 1.4rem; }
  .info-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    color: #eee;
    font-size: 0.95rem;
    padding: 0 4px;
  }
  .score { color: #0f0; font-weight: bold; }
  .best { color: #ffd700; font-weight: bold; }
  canvas {
    border: 2px solid #e94560;
    background: #16213e;
    display: block;
    margin: 0 auto;
    max-width: 100%;
    touch-action: manipulation;
  }
  .game-over-msg {
    color: #e94560;
    font-size: 0.95rem;
    margin-top: 2px;
    min-height: 22px;
  }

  /* 触控按键 */
  .touch-controls {
    margin-top: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .dpad-row {
    display: flex;
    gap: 4px;
  }
  .dpad-btn {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 1.4rem;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .dpad-btn:active {
    background: rgba(233,69,96,0.6);
    border-color: #e94560;
  }
  .dpad-empty {
    width: 56px;
    height: 56px;
    visibility: hidden;
  }
  .action-row {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .action-btn {
    padding: 14px 28px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.08);
    color: #ddd;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    font-family: inherit;
  }
  .action-btn:active {
    background: rgba(255,255,255,0.2);
  }
  .btn-start {
    border-color: #00ff88;
    color: #00ff88;
    background: rgba(0,255,136,0.1);
  }
  .btn-start:active {
    background: rgba(0,255,136,0.3);
  }

  .keyboard-tip {
    margin-top: 6px;
    color: #666;
    font-size: 0.75rem;
  }
  .keyboard-tip span { color: #e94560; }
</style>
</head>
<body>
<div class="game-wrapper">
  <h1>🐍 贪食蛇</h1>
  <div class="info-bar">
    <span>🍎 得分: <span class="score" id="score">0</span></span>
    <span>🏆 最高: <span class="best" id="best">0</span></span>
  </div>
  <canvas id="canvas"></canvas>
  <div class="game-over-msg" id="msg">按"开始游戏"或空格键开始</div>

  <div class="touch-controls" id="touchControls">
    <div class="dpad-row">
      <div class="dpad-empty"></div>
      <button class="dpad-btn" id="btnUp">▲</button>
      <div class="dpad-empty"></div>
    </div>
    <div class="dpad-row">
      <button class="dpad-btn" id="btnLeft">◀</button>
      <button class="dpad-btn" id="btnPause">⏯</button>
      <button class="dpad-btn" id="btnRight">▶</button>
    </div>
    <div class="dpad-row">
      <div class="dpad-empty"></div>
      <button class="dpad-btn" id="btnDown">▼</button>
      <div class="dpad-empty"></div>
    </div>
    <div class="action-row">
      <button class="action-btn btn-start" id="btnStart">▶ 开始游戏</button>
      <button class="action-btn" id="btnRestart">🔄 重新开始</button>
    </div>
  </div>

  <div class="keyboard-tip">
    <span>↑↓←→ / WASD</span> 方向 &nbsp;|&nbsp;
    <span>空格</span> 暂停/开始 &nbsp;|&nbsp;
    <span>R</span> 重来
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// 自适应：小屏幕格子更小
const isSmall = Math.min(window.innerWidth, window.innerHeight) < 500;
const GRID = isSmall ? 15 : 20;
const COLS = 25;
const ROWS = 25;
canvas.width = COLS * GRID;
canvas.height = ROWS * GRID;

let snake, food, direction, nextDirection, score, best, gameOver, paused, gameLoop, started;

// 触控方向
function setDir(dx, dy) {
  if (gameOver) return;
  if (!started) return;
  if (dx !== 0 && direction.x === -dx) return;
  if (dy !== 0 && direction.y === -dy) return;
  nextDirection = { x: dx, y: dy };
}

function togglePause() {
  if (gameOver) return;
  if (!started) return;
  paused = !paused;
  document.getElementById('msg').textContent = paused ? '⏸ 已暂停' : '';
}

function startGame() {
  if (started && !gameOver) return; // 已经开始了
  if (gameOver) {
    // 游戏结束后点开始 = 重新开始
    resetGame();
  }
  started = true;
  paused = false;
  document.getElementById('msg').textContent = '';
  clearInterval(gameLoop);
  gameLoop = setInterval(step, 180);
}

function resetGame() {
  snake = [
    { x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) },
    { x: Math.floor(COLS / 2) - 1, y: Math.floor(ROWS / 2) },
    { x: Math.floor(COLS / 2) - 2, y: Math.floor(ROWS / 2) },
  ];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  score = 0;
  gameOver = false;
  paused = false;
  started = false;
  best = parseInt(localStorage.getItem('snakeBest')) || 0;
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('msg').textContent = '按"开始游戏"或空格键开始';
  spawnFood();
  clearInterval(gameLoop);
  draw();
}

// 触控按钮绑定
function bindBtn(id, fn) {
  const btn = document.getElementById(id);
  btn.addEventListener('touchstart', e => { e.preventDefault(); fn(); }, {passive: false});
  btn.addEventListener('mousedown', e => { e.preventDefault(); fn(); });
}
bindBtn('btnUp', () => setDir(0, -1));
bindBtn('btnDown', () => setDir(0, 1));
bindBtn('btnLeft', () => setDir(-1, 0));
bindBtn('btnRight', () => setDir(1, 0));
bindBtn('btnPause', () => togglePause());
bindBtn('btnStart', () => startGame());
bindBtn('btnRestart', () => resetGame());

function spawnFood() {
  do {
    food = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS),
    };
  } while (snake.some(s => s.x === food.x && s.y === food.y));
}

function step() {
  if (gameOver || paused || !started) return;

  direction = { ...nextDirection };

  const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return endGame();
  }

  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return endGame();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    document.getElementById('score').textContent = score;
    if (score > best) {
      best = score;
      localStorage.setItem('snakeBest', best);
      document.getElementById('best').textContent = best;
    }
    spawnFood();
  } else {
    snake.pop();
  }

  draw();
}

function endGame() {
  gameOver = true;
  started = false;
  clearInterval(gameLoop);
  document.getElementById('msg').textContent = '💀 游戏结束！点"开始游戏"再来';
  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 网格
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * GRID, 0); ctx.lineTo(x * GRID, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * GRID); ctx.lineTo(canvas.width, y * GRID); ctx.stroke();
  }

  // 食物
  ctx.fillStyle = '#e94560';
  ctx.shadowColor = '#e94560';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // 蛇
  snake.forEach((s, i) => {
    const x = s.x * GRID + 1, y = s.y * GRID + 1, size = GRID - 2;
    if (i === 0) {
      ctx.fillStyle = '#00ff88';
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 6;
    } else {
      const t = i / snake.length;
      ctx.fillStyle = `rgb(${Math.floor(t * 30)},${Math.floor(200 - t * 120)},${Math.floor(70 - t * 40)})`;
      ctx.shadowBlur = 0;
    }
    ctx.beginPath();
    ctx.roundRect(x, y, size, size, 4);
    ctx.fill();
  });
  ctx.shadowBlur = 0;
}

// 键盘
document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();

  if (key === 'arrowup'    || key === 'w') { if (direction.y !== 1)  nextDirection = { x: 0, y: -1 }; if (!started) startGame(); e.preventDefault(); }
  if (key === 'arrowdown'  || key === 's') { if (direction.y !== -1) nextDirection = { x: 0, y: 1 };  if (!started) startGame(); e.preventDefault(); }
  if (key === 'arrowleft'  || key === 'a') { if (direction.x !== 1)  nextDirection = { x: -1, y: 0 }; if (!started) startGame(); e.preventDefault(); }
  if (key === 'arrowright' || key === 'd') { if (direction.x !== -1) nextDirection = { x: 1, y: 0 };  if (!started) startGame(); e.preventDefault(); }

  if (key === ' ') { if (gameOver) resetGame(); else if (!started) startGame(); else togglePause(); e.preventDefault(); }
  if (key === 'r') { resetGame(); e.preventDefault(); }
});

// 初始化：画静态画面，不开始游戏
function init() {
  snake = [
    { x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) },
    { x: Math.floor(COLS / 2) - 1, y: Math.floor(ROWS / 2) },
    { x: Math.floor(COLS / 2) - 2, y: Math.floor(ROWS / 2) },
  ];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  score = 0;
  gameOver = false;
  paused = false;
  started = false;
  best = parseInt(localStorage.getItem('snakeBest')) || 0;
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('msg').textContent = '按"开始游戏"或空格键开始';
  spawnFood();
  draw();
}

init();
</script>
</body>
</html>
