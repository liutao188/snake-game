<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐍 贪食蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    font-family: 'Courier New', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  .game-wrapper {
    text-align: center;
    padding: 10px;
    max-width: 500px;
    width: 100%;
  }
  h1 { color: #e94560; margin-bottom: 6px; font-size: clamp(1.2rem, 5vw, 2rem); }
  .info-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    color: #eee;
    font-size: clamp(0.85rem, 3.5vw, 1.1rem);
  }
  .score { color: #0f0; }
  .best { color: #ffd700; }
  canvas {
    border: 2px solid #e94560;
    background: #16213e;
    display: block;
    margin: 0 auto;
    max-width: 100%;
    height: auto;
  }
  .game-over-msg {
    color: #e94560;
    font-size: 1rem;
    margin-top: 4px;
    min-height: 24px;
  }

  /* ===== 手机触控按键 ===== */
  .touch-controls {
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .dpad-row {
    display: flex;
    gap: 6px;
  }
  .dpad-btn {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 1.5rem;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
  }
  .dpad-btn:active, .dpad-btn.pressed {
    background: rgba(233,69,96,0.5);
    border-color: #e94560;
  }
  .dpad-empty {
    width: 60px;
    height: 60px;
    visibility: hidden;
  }

  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }
  .action-btn {
    padding: 12px 24px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    color: #ccc;
    font-size: 0.95rem;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    font-family: inherit;
  }
  .action-btn:active {
    background: rgba(255,255,255,0.15);
  }

  /* 电脑端隐藏触控按键 */
  .touch-controls { display: none; }
  @media (hover: none) and (pointer: coarse) {
    .touch-controls { display: flex; }
    .keyboard-tip { display: none; }
  }

  .keyboard-tip {
    margin-top: 8px;
    color: #888;
    font-size: 0.8rem;
  }
  .keyboard-tip span { color: #e94560; font-weight: bold; }
</style>
</head>
<body>
<div class="game-wrapper">
  <h1>🐍 贪食蛇</h1>
  <div class="info-bar">
    <span>🍎 得分: <span class="score" id="score">0</span></span>
    <span>🏆 最高: <span class="best" id="best">0</span></span>
  </div>
  <canvas id="canvas"></canvas>
  <div class="game-over-msg" id="msg"></div>
  <div class="keyboard-tip">
    <span>↑↓←→ / WASD</span> 方向 &nbsp;|&nbsp;
    <span>空格</span> 暂停 &nbsp;|&nbsp;
    <span>R</span> 重来
  </div>

  <!-- 手机触控按键 -->
  <div class="touch-controls" id="touchControls">
    <div class="dpad-row">
      <div class="dpad-empty"></div>
      <button class="dpad-btn" id="btnUp">▲</button>
      <div class="dpad-empty"></div>
    </div>
    <div class="dpad-row">
      <button class="dpad-btn" id="btnLeft">◀</button>
      <button class="dpad-btn" id="btnPause">⏯</button>
      <button class="dpad-btn" id="btnRight">▶</button>
    </div>
    <div class="dpad-row">
      <div class="dpad-empty"></div>
      <button class="dpad-btn" id="btnDown">▼</button>
      <div class="dpad-empty"></div>
    </div>
    <div class="action-row">
      <button class="action-btn" id="btnRestart">🔄 重新开始</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// 自适应大小：手机上格子小一点
const isMobile = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
const GRID = isMobile ? 16 : 20;
const COLS = 25;
const ROWS = 25;
canvas.width = COLS * GRID;
canvas.height = ROWS * GRID;

let snake, food, direction, nextDirection, score, best, gameOver, paused, gameLoop;

// 触控方向函数
function setDir(dx, dy) {
  if (gameOver) return;
  if (dx !== 0 && direction.x === -dx) return; // 防反向
  if (dy !== 0 && direction.y === -dy) return;
  nextDirection = { x: dx, y: dy };
}

function togglePause() {
  if (gameOver) return;
  paused = !paused;
  document.getElementById('msg').textContent = paused ? '⏸ 已暂停' : '';
}

// 触控按钮事件（用 pointerdown 响应更快）
document.getElementById('btnUp').addEventListener('pointerdown', e => { setDir(0, -1); e.preventDefault(); });
document.getElementById('btnDown').addEventListener('pointerdown', e => { setDir(0, 1); e.preventDefault(); });
document.getElementById('btnLeft').addEventListener('pointerdown', e => { setDir(-1, 0); e.preventDefault(); });
document.getElementById('btnRight').addEventListener('pointerdown', e => { setDir(1, 0); e.preventDefault(); });
document.getElementById('btnPause').addEventListener('pointerdown', e => { togglePause(); e.preventDefault(); });
document.getElementById('btnRestart').addEventListener('pointerdown', e => { init(); e.preventDefault(); });

// 阻止触控按键的 click 导致的双重触发和页面缩放
document.querySelectorAll('.dpad-btn, .action-btn').forEach(btn => {
  btn.addEventListener('touchstart', e => e.preventDefault());
});

// 初始化
function init() {
  snake = [
    { x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) },
    { x: Math.floor(COLS / 2) - 1, y: Math.floor(ROWS / 2) },
    { x: Math.floor(COLS / 2) - 2, y: Math.floor(ROWS / 2) },
  ];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  score = 0;
  gameOver = false;
  paused = false;
  best = parseInt(localStorage.getItem('snakeBest')) || 0;
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('msg').textContent = '';
  spawnFood();
  clearInterval(gameLoop);
  gameLoop = setInterval(step, 180);
}

function spawnFood() {
  do {
    food = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS),
    };
  } while (snake.some(s => s.x === food.x && s.y === food.y));
}

function step() {
  if (gameOver || paused) return;

  direction = { ...nextDirection };

  const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return endGame();
  }

  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return endGame();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    document.getElementById('score').textContent = score;
    if (score > best) {
      best = score;
      localStorage.setItem('snakeBest', best);
      document.getElementById('best').textContent = best;
    }
    spawnFood();
  } else {
    snake.pop();
  }

  draw();
}

function endGame() {
  gameOver = true;
  clearInterval(gameLoop);
  document.getElementById('msg').textContent = '💀 游戏结束！点重新开始';
  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 网格线
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * GRID, 0); ctx.lineTo(x * GRID, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * GRID); ctx.lineTo(canvas.width, y * GRID); ctx.stroke();
  }

  // 食物
  ctx.fillStyle = '#e94560';
  ctx.shadowColor = '#e94560';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // 蛇
  snake.forEach((s, i) => {
    const x = s.x * GRID + 1, y = s.y * GRID + 1, size = GRID - 2;
    if (i === 0) {
      ctx.fillStyle = '#00ff88';
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 6;
    } else {
      const t = i / snake.length;
      ctx.fillStyle = `rgb(${Math.floor(t * 30)},${Math.floor(200 - t * 120)},${Math.floor(70 - t * 40)})`;
      ctx.shadowBlur = 0;
    }
    ctx.beginPath();
    ctx.roundRect(x, y, size, size, 4);
    ctx.fill();
  });
  ctx.shadowBlur = 0;
}

// 键盘控制
document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();

  if (key === 'arrowup'    || key === 'w') { if (direction.y !== 1)  nextDirection = { x: 0, y: -1 }; e.preventDefault(); }
  if (key === 'arrowdown'  || key === 's') { if (direction.y !== -1) nextDirection = { x: 0, y: 1 };  e.preventDefault(); }
  if (key === 'arrowleft'  || key === 'a') { if (direction.x !== 1)  nextDirection = { x: -1, y: 0 }; e.preventDefault(); }
  if (key === 'arrowright' || key === 'd') { if (direction.x !== -1) nextDirection = { x: 1, y: 0 };  e.preventDefault(); }

  if (key === ' ') { togglePause(); e.preventDefault(); }
  if (key === 'r') { init(); e.preventDefault(); }
});

init();
</script>
</body>
</html>
